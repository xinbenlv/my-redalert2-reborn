<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Red Alert 2: Reborn</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="skirmish-setup-overlay">
        <div class="setup-header">
            <div>
                <div class="setup-kicker">SKIRMISH COMMAND</div>
                <h2>Battlefield Setup</h2>
            </div>
            <div id="setup-briefing"></div>
        </div>
        <div class="setup-grid">
            <label>
                <span>Starting Credits</span>
                <select id="setup-starting-credits">
                    <option value="5000">Short Ops — $5000</option>
                    <option value="6500" selected>Standard — $6500</option>
                    <option value="10000">Long War — $10000</option>
                </select>
            </label>
            <label>
                <span>Battlefield</span>
                <select id="setup-map">
                    <option value="classic" selected>Classic Frontier</option>
                    <option value="crossroads">Crossroads</option>
                </select>
            </label>
            <label>
                <span>Your Faction</span>
                <select id="setup-player-faction">
                    <option value="soviet" selected>Soviet</option>
                    <option value="allied">Allied</option>
                </select>
            </label>
            <label>
                <span>AI Difficulty</span>
                <select id="setup-ai-difficulty">
                    <option value="easy">Easy</option>
                    <option value="medium" selected>Medium</option>
                    <option value="hard">Hard</option>
                </select>
            </label>
        </div>
        <button id="skirmish-start-button">Launch Skirmish</button>
    </div>
    <div id="ui-overlay">
        <div id="top-bar">
            <div id="money-display">CREDITS <span id="money">5000</span></div>
            <div id="game-title">RED ALERT 2: REBORN</div>
            <div id="power-display">POWER STANDBY</div>
        </div>
        <button id="sidebar-toggle" aria-label="Toggle sidebar">☰</button>
        <div id="sidebar">
            <div id="minimap-container">
                <canvas id="minimap" width="180" height="180"></canvas>
            </div>
            <div id="build-panel">
                <div class="build-tabs">
                    <div class="build-tab active" data-tab="buildings" title="Construct">BUILD</div>
                    <div class="build-tab" data-tab="units" title="Train">TRAIN</div>
                </div>
                <div id="build-items"></div>
            </div>
            <div id="selection-info"></div>
        </div>
        <div id="eva-message"></div>
    </div>
    <div id="version-info"></div>
    <script src="js/version.js"></script>
    <script src="js/three.min.js"></script>
    <script src="js/data/buildings.js"></script>
    <script src="js/data/units.js"></script>
    <script src="js/models.js"></script>
    <script src="js/renderer3d.js"></script>
    <script src="js/systems/power.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
